id: creative-writing-v1
name: creative_writing
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  AI creative writing assistant that generates short stories and creative content.
  Uses Agno framework with Moonshot AI (kimi-k2-thinking) or OpenRouter models.
  Supports project folder creation, markdown file writing, and context compression.

# Tags and Modes
tags:
  - creative-writing
  - short-stories
  - fiction
  - storytelling

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown

# Example Queries
examples:
  - "Write a complete science fiction short story set in the year 2150 where humanity survives in floating cities above Earth after environmental collapse"
  - "Write a fantasy short story about a hidden kingdom inside a massive mountain range discovered by a wandering cartographer named Elias"
  - "Create a mystery short story with a clear narrative arc and character development"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Generates creative writing content using AI models with project organization"
    features:
      - "Project folder creation with sanitized names in output directory"
      - "Markdown file writing with three modes: create, append, overwrite"
      - "Context compression for managing long conversations"
      - "Optional Mem0 memory integration"
    limitations: "Output length depends on model token limits; context compression triggered automatically when needed"

  secondary_capability:
    supported: false

# Requirements
requirements:
  packages:
    - agno
    - bindu
    - python-dotenv
  system:
    - "File system write access for output directory"
    - "Internet access for API calls"
  min_memory_mb: 256
  external_services:
    - Moonshot AI API (kimi models)
    - OpenRouter API (alternative models)
    - Mem0 API (optional)

# Performance Metrics
performance:
  avg_processing_time_ms: 15000
  max_concurrent_requests: 1
  memory_per_request_mb: 512
  scalability: vertical

# Tool Restrictions
allowed_tools:
  - ProjectTool
  - WriterTool
  - CompressionTool
  - Mem0Tools

# Rich Documentation
documentation:
  overview: |
    Creative writing agent built on Agno framework using Moonshot AI's kimi-k2-thinking model
    or OpenRouter models. Provides project management, file writing, and context compression
    for creative writing tasks. Agent creates organized project folders and writes markdown files
    with support for create, append, and overwrite modes.

  use_cases:
    when_to_use:
      - "Generating creative short stories with specific requirements"
      - "Writing fiction with structured narrative arcs"
      - "Creating organized writing projects with multiple files"
      - "Tasks requiring project folder management and file organization"

    when_not_to_use:
      - "Real-time chat or conversational interactions"
      - "Code generation or technical documentation"
      - "Tasks not requiring file output or project organization"
      - "Very short content that doesn't need project structure"

  input_structure: |
    JSON-RPC 2.0 message with text request in parts array.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [
            {
              "kind": "text",
              "text": "Write a complete science fiction short story..."
            }
          ],
          "kind": "message",
          "messageId": "51d7a210-5616-49ad-b187-d93cbb200001",
          "contextId": "51d7a210-5616-49ad-b187-d93cbb200002",
          "taskId": "51d7a210-5616-49ad-b187-d93cbb200003"
        },
        "skillId": "creative-writing-v1",
        "configuration": {
          "acceptedOutputModes": ["application/json"]
        }
      },
      "id": "51d7a210-5616-49ad-b187-d93cbb200003"
    }

  output_format: |
    JSON-RPC 2.0 result with task status, history, and artifacts.

    Success Response:
    {
      "jsonrpc": "2.0",
      "id": "51d7a210-5616-49ad-b187-d93cbb200003",
      "result": {
        "id": "51d7a210-5616-49ad-b187-d93cbb200003",
        "context_id": "51d7a210-5616-49ad-b187-d93cbb200002",
        "kind": "task",
        "status": {
          "state": "completed",
          "timestamp": "2026-03-06T12:14:26.405433+00:00"
        },
        "history": [
          {
            "role": "user",
            "parts": [{"kind": "text", "text": "Write a complete science fiction short story..."}]
          },
          {
            "role": "assistant",
            "parts": [{"kind": "text", "text": "## Story Title\n\nStory content..."}]
          }
        ],
        "artifacts": [
          {
            "artifact_id": "4a4401eb-3f33-47ef-9036-704840ba5112",
            "name": "result",
            "parts": [{"kind": "text", "text": "## Story Title\n\nStory content..."}]
          }
        ]
      }
    }

  error_handling:
    - "API failures: Returns error message in response"
    - "File write errors: Tool returns error message"
    - "No active project: WriterTool requires create_project first"
    - "File exists in create mode: Returns error, suggests append or overwrite"

  examples:
    - title: "Science Fiction Short Story"
      input:
        parts:
          - kind: "text"
            text: "Write a complete science fiction short story set in the year 2150 where humanity survives in floating cities above Earth after environmental collapse. The story must have a mysterious tone and focus on atmospheric world-building. The protagonist is a young orbital engineer named Mira who discovers a hidden transmission inside an abandoned satellite suggesting Earth may still be recoverable. Include emotional character development, a clear narrative arc (beginning, rising conflict, climax, twist ending), and rich descriptions of technology and floating-city life. The story must be self-contained, approximately 1200 words, written in third-person perspective, and suitable for a general adult audience. Do not ask follow-up questions and produce the full story in a single response."
      output:
        text: |
          ## Horizon of the Remnant World

          Mira floated in the thick silence of the control room, her fingers dancing across the holographic interface...
          [Story continues with complete narrative]

    - title: "Fantasy Short Story"
      input:
        parts:
          - kind: "text"
            text: "Write a fantasy short story about a hidden kingdom inside a massive mountain range discovered by a wandering cartographer named Elias. The tone must be adventurous and mysterious. Include detailed descriptions of the landscape, ancient architecture, and the culture of the hidden civilization. Structure the story with a clear beginning, conflict, climax, and resolution. The story should be written in third-person narrative style, approximately 1000 words long, suitable for fantasy readers, and contain vivid world-building and character dialogue. Produce the complete story in a single response and do not ask for additional clarification."
      output:
        text: |
          ## The Lost Cartography of Elias

          Elias had always been drawn to the unknown, to places unmarked on any map...
          [Story continues with complete narrative]

  best_practices:
    for_developers:
      - "Initialize agent with model selection (kimi-k2-thinking or OpenRouter models)"
      - "Provide MOONSHOT_API_KEY or OPENROUTER_API_KEY environment variables"
      - "Optional MEM0_API_KEY for memory features"
      - "Agent uses async handler with lazy initialization"

    for_orchestrators:
      - "Route creative writing requests to this skill"
      - "Expect async task processing with submitted/completed states"
      - "Agent returns markdown-formatted stories in response"
      - "Processing time varies based on content length and model"
      - "Single active project folder at a time"

  installation: |
    Install dependencies and configure environment variables.

    Environment variables:
    MOONSHOT_API_KEY=<moonshot-api-key> (optional, for kimi models)
    OPENROUTER_API_KEY=<openrouter-api-key> (required if not using Moonshot)
    MEM0_API_KEY=<mem0-api-key> (optional)
    MODEL_NAME=kimi-k2-thinking (default)

    Run:
    python -m writer_agent.main

    Server runs on http://0.0.0.0:3773 by default.

  versioning:
    - version: "1.0.0"
      date: "2026-03-11"
      changes: "Initial release with Agno framework, project management, file writing, and context compression"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "creative writing"
    - "story"
    - "fiction"
    - "narrative"
    - "write"
    - "short story"

  specializations:
    - domain: "creative-writing"
      confidence_boost: 0.4
    - domain: "fiction"
      confidence_boost: 0.3

  anti_patterns:
    - "Real-time chat"
    - "Code generation"
    - "Technical documentation"
    - "Data analysis"

  complexity_indicators:
    simple:
      - "Write a short story"
      - "Create a simple narrative"
    medium:
      - "Write a story with specific requirements and structure"
      - "Create fiction with character development and plot arc"
    complex:
      - "Generate multi-chapter novels with detailed world-building"
      - "Create interconnected story collections with thematic elements"
